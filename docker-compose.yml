services:

  # ──────────────────────────
  # MongoDB
  # ──────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ekalavya_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ekalavya_admin
      MONGO_INITDB_ROOT_PASSWORD: ekalavya_pass
      MONGO_INITDB_DATABASE: ekalavya
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - ekalavya_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────
  # FastAPI Backend
  # ──────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ekalavya_api
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://ekalavya_admin:ekalavya_pass@mongo:27017/ekalavya?authSource=admin
      DB_NAME: ekalavya
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ekalavya_net
    volumes:
      - ./backend:/app

  # ──────────────────────────
  # Frontend (nginx static)
  # ──────────────────────────
  frontend:
    image: nginx:alpine
    container_name: ekalavya_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ekalavya_net

  # ──────────────────────────
  # Mongo Express (DB Admin UI)
  # ──────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: ekalavya_mongoexpress
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ekalavya_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ekalavya_pass
      ME_CONFIG_MONGODB_URL: mongodb://ekalavya_admin:ekalavya_pass@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ekalavya_net

# ──────────────────────────
# Volumes & Networks
# ──────────────────────────
volumes:
  mongo_data:
    driver: local

networks:
  ekalavya_net:
    driver: bridge
