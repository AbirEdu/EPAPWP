services:

  # ──────────────────────────
  # FastAPI Backend
  # ──────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ekalavya_api
    restart: unless-stopped
    environment:
      MONGO_URL: "${MONGO_URL:?Set MONGO_URL in .env to your MongoDB Atlas connection string}"
      DB_NAME: "${DB_NAME:-ekalavya}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env, generate with openssl rand -hex 32}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID:-}"
      YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET:-}"
      YOUTUBE_REFRESH_TOKEN: "${YOUTUBE_REFRESH_TOKEN:-}"
    ports:
      - "8000:8000"
    networks:
      - ekalavya_net
    volumes:
      - ./backend:/app

  # ──────────────────────────
  # Frontend (nginx static)
  # ──────────────────────────
  frontend:
    image: nginx:alpine
    container_name: ekalavya_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ekalavya_net

# ──────────────────────────
# Networks
# ──────────────────────────
networks:
  ekalavya_net:
    driver: bridge
