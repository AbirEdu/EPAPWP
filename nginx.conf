server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Video feedback uploads (up to 100MB) + the server-side YouTube upload
        # that follows need more room than nginx's 1MB/60s defaults.
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Cache images/fonts long-term — these rarely change
    location ~* \.(jpg|jpeg|png|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS change often during active development — always revalidate with the
    # server (a fast 304 if unchanged) instead of blindly trusting a stale cached
    # copy for days. Prevents "I fixed it but it's not showing up" confusion.
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
